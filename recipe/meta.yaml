{% set name = "pydorado" %}
{% set version = "2.6.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/pydorado-{{ version }}.tar.gz
  sha256: a408a2ec179748cafd950e8f49d9e9cbaf087982e4b94ab419260e486e220662

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools
  run:
    - python >={{ python_min }}
    - numpy
    - matplotlib-base
    - scipy
    - future
    - tqdm

test:
  imports:
    - dorado
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/passaH2O/dorado
  summary: dorado - Lagrangian particle routing routine via weighted random walks
  license: MIT
  license_file: LICENSE
  doc_url: https://passah2o.github.io/dorado
  dev_url: https://github.com/passaH2O/dorado

extra:
  recipe-maintainers:
    - elbeejay
    - wrightky
